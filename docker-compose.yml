# Full Circled stack — proof-server + API + static frontend + Redis
# Usage: docker compose up --build
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 10

  proof-server:
    image: midnightntwrk/proof-server:8.0.3
    command: ["midnight-proof-server", "-v"]
    ports:
      - "6300:6300"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:6300/health"]
      interval: 10s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: "8787"
      BIND_HOST: "0.0.0.0"
      NYXPAY_BOOT_SOFT: "1"
      NYXPAY_ALLOW_EPHEMERAL_KEK: "1"
      NYXPAY_ALLOW_DEMO_SEED: "1"
      MIDNIGHT_PROOF_SERVER_URL: http://proof-server:6300
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:8080,http://127.0.0.1:8080
    ports:
      - "8787:8787"
    depends_on:
      - proof-server
      - redis

  web:
    image: nginx:1.27-alpine
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - api
