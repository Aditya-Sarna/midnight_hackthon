<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Circled — Regulator portal</title>
    <style>
      :root {
        --bg: #050403;
        --ink: #f7f1e8;
        --soft: rgba(247, 241, 232, 0.62);
        --faint: rgba(247, 241, 232, 0.34);
        --rule: rgba(247, 241, 232, 0.22);
        --font: "Outfit", system-ui, sans-serif;
        --display: "Syne", system-ui, sans-serif;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        font-family: var(--font);
        color: var(--ink);
        background:
          radial-gradient(ellipse 70% 50% at 20% 10%, rgba(247,241,232,0.05), transparent 55%),
          linear-gradient(165deg, #0a0908, #050403 50%, #030201);
        padding: 48px 24px 80px;
      }
      main { max-width: 720px; margin: 0 auto; }
      .kicker {
        letter-spacing: 0.28em;
        text-transform: uppercase;
        font-size: 0.68rem;
        color: var(--faint);
        margin-bottom: 10px;
      }
      h1 {
        font-family: var(--display);
        font-weight: 800;
        letter-spacing: -0.05em;
        font-size: clamp(2.4rem, 6vw, 3.4rem);
        margin-bottom: 12px;
      }
      .lede { color: var(--soft); max-width: 36ch; margin-bottom: 32px; line-height: 1.45; }
      .panel {
        border: 1px solid var(--rule);
        border-radius: 20px;
        padding: 22px;
        background: rgba(247,241,232,0.05);
        backdrop-filter: blur(12px);
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 0.78rem;
        line-height: 1.45;
        color: var(--soft);
      }
      .err { color: #f07178; margin-top: 12px; }
      button {
        margin-top: 16px;
        border: 1px solid var(--rule);
        background: var(--ink);
        color: #0a0a0a;
        border-radius: 999px;
        padding: 12px 18px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="kicker">Read-only · auditReporting</p>
      <h1>Regulator portal</h1>
      <p class="lede">
        Aggregated public audit trail — commitments and counts only. No balances, names, or plaintext.
      </p>
      <div class="panel">
        <pre id="out">Loading…</pre>
        <p class="err" id="err" hidden></p>
        <button type="button" id="reload">Refresh report</button>
      </div>
    </main>
    <script>
      async function load() {
        const out = document.getElementById("out");
        const err = document.getElementById("err");
        err.hidden = true;
        try {
          const res = await fetch("/api/compliance/audit-report");
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "Failed to load audit report");
          out.textContent = JSON.stringify(data, null, 2);
        } catch (e) {
          err.hidden = false;
          err.textContent = e.message || String(e);
          out.textContent = "—";
        }
      }
      document.getElementById("reload").onclick = load;
      load();
    </script>
  </body>
</html>
